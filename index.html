<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Am I Cooked?</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Am I Cooked?</h1>
        <p class="subtitle">
      Random life disasters. Find out if you're finished.
    </p>

    <div class="card">
      <h2>Scenario</h2>
      <p id="scenarioText">
        Press the button to ruin your day.
      </p>

      <button id="scenarioBtn">
        Give Me A Scenario
      </button>

      <button id="cookBtn">
        Am I Cooked?
      </button>
    </div>

    <div class="result-card">
      <h2>Results</h2>
      <p id="resultText">
        Waiting for disaster...
      </p>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
